# =============================================================================
# flags.yaml — Feature Flag Configuration
# =============================================================================
# This file is tracked by Git (SCM).
# Every change here is a Git commit, providing:
#   - Version Control         : full history of every flag state
#   - Configuration Identification : each commit has a unique SHA
#   - Configuration Status Accounting : current state is always visible
#   - Audit Trail             : who changed what and when (git log)
#   - Controlled Rollout      : change a flag, commit, proxy reloads automatically
#
# File format: GO Feature Flag (https://gofeatureflag.org/)
# Relay Proxy polls this file and serves it via the OFREP REST API.
# =============================================================================

# ── 1. Discount Banner ────────────────────────────────────────────────────────
# Shows "FLAT X% OFF" banner on the homepage and product cards.
# Set to true to start a flash sale; false to end it.
discount-banner-enabled:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: enabled   # Change to "enabled" to activate discount banner

# ── 2. Discount Percentage ────────────────────────────────────────────────────
# Controls the numeric % shown in the discount banner.
# Can be changed independently of the banner toggle.
discount-percentage:
  variations:
    ten: "10"
    twenty: "20"
    thirty: "30"
  defaultRule:
    variation: thirty        # Change to "twenty" or "thirty" to adjust

# ── 3. Cash on Delivery ───────────────────────────────────────────────────────
# Enables / disables COD as a checkout payment option.
# Set to false to force digital payments only.
cash-on-delivery-enabled:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: enabled   # Change to "enabled" to allow COD

# ── 4. Promotional Banner ─────────────────────────────────────────────────────
# Shows a coloured strip banner at the top of every page.
promo-banner-enabled:
  variations:
    enabled: true
    disabled: false
  defaultRule:
    variation: disabled   # Change to "enabled" to show the promo strip

# ── 5. Promotional Banner Text ────────────────────────────────────────────────
# The message shown inside the promotional banner.
promo-banner-text:
  variations:
    sale:    "🔥 Grand Sale! Up to 50% off on all products. Shop Now!"
    festive: "🎊 Festive Offers: Free Shipping on orders above ₹999!"
    default: "Welcome to ShopSmart — India's favourite online store!"
  defaultRule:
    variation: default      # Change to "sale" or "festive" for campaigns

# ── 6. New Checkout Layout ────────────────────────────────────────────────────
# Toggles the checkout page UI between:
#   false → classic single-column form
#   true  → modern two-column layout (shipping left, summary right)
# Use this to A/B test checkout UX.
new-checkout-layout:
  variations:
    new:     true
    classic: false
  defaultRule:
    variation: classic     # Change to "new" to activate two-column layout
