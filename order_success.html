{% extends "layout.html" %}
{% block title %}Order Placed!{% endblock %}

{% block content %}
<div class="text-center py-5">
  <div style="font-size:5rem">🎉</div>
  <h2 class="fw-bold text-success mt-3">Order Placed Successfully!</h2>
  <p class="text-muted mt-2 fs-5">
    Thank you for shopping with ShopSmart.<br>
    Your order will be delivered within 3–5 business days.
  </p>
  <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg mt-3">
    <i class="bi bi-shop"></i> Continue Shopping
  </a>
  <a href="{{ url_for('admin_orders') }}" class="btn btn-outline-secondary btn-lg mt-3 ms-2">
    <i class="bi bi-receipt"></i> View All Orders
  </a>
</div>
{% endblock %}
