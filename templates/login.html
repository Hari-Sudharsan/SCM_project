{% extends "layout.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <div style="font-size:3.5rem">👤</div>
          <h3 class="fw-bold mt-2">Welcome Back</h3>
          <p class="text-muted small">Sign in to ShopSmart</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control form-control-lg rounded-3"
                   placeholder="Enter your name" required autofocus/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg rounded-3"
                   placeholder="Enter your password" required/>
            <small class="text-muted">Demo: any password works</small>
          </div>
          <button type="submit" class="btn btn-dark w-100 btn-lg rounded-pill mt-2">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </button>
        </form>

        <div class="text-center mt-3">
          <small class="text-muted">
            This is a demo app — no real authentication.
          </small>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
